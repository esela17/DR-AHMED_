name: 🚀 Deploy to GitHub Pages & Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./app

      - name: Build project for GitHub Pages
        run: npm run build
        working-directory: ./app
        env:
          NODE_ENV: production
          VITE_BASE_PATH: /DR-AHMED_/

      - name: Copy index.html to 404.html for GitHub Pages routing
        run: cp dist/index.html dist/404.html
        working-directory: ./app

      - name: Build project for Cloudflare Pages
        run: npx vite build --outDir dist-cloudflare
        working-directory: ./app
        env:
          NODE_ENV: production
          VITE_BASE_PATH: /

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './app/dist'

      - name: Upload dist for Cloudflare job
        uses: actions/upload-artifact@v4
        with:
          name: dist-cloudflare
          path: ./app/dist-cloudflare

  deploy-github:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-cloudflare:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-cloudflare
          path: ./dist-cloudflare

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: dr-ahmed-abdallah
          directory: ./dist-cloudflare
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
