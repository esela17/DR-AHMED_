<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>د. أحمد عبدالله مهلهل | أخصائي طب وجراحة العيون</title>
    <script>
      // GitHub Pages SPA redirect fix
      // When GitHub Pages returns 404, this page redirects back to index.html
      // with the original URL path encoded in the query string
      var pathSegmentsToKeep = 1; // 1 = keep the /DR-AHMED_/ base

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
